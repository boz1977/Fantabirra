<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — {{ league_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#1b5e20">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Fantabirra">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icon-192.png') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/icon-192.png') }}">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card bg-white">
    <div class="login-header">
      <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="{{ league_name }}">
      <h4>{{ league_name }}</h4>
      <p class="text-white-50 small mb-0">Gestione Aste Fantacalcio</p>
    </div>
    <div class="p-4">
      {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
      <div class="alert alert-{{ cat }} py-2 small mb-3">{{ msg }}</div>
      {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold small">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Il tuo username"
                   required autofocus autocomplete="username">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Password"
                   required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn btn-green w-100 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Accedi
        </button>
      </form>
      <p class="text-center text-muted small mt-3 mb-0">
        Contatta l'amministratore per ottenere le credenziali.
      </p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
}
</script>
</body>
</html>
